name: Release Server

on:
  push:
    tags: ['server/v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., server/v0.1.0). Leave empty when triggered by tag push.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Build & Release Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          RAW_TAG="${{ github.event.inputs.version }}"
          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="${{ github.ref_name }}"
          fi
          if [[ ! "$RAW_TAG" =~ ^server/v ]]; then
            echo "::error::Invalid tag format '$RAW_TAG'. Expected 'server/v*' (e.g., server/v0.1.0-beta.1)."
            exit 1
          fi
          VERSION="${RAW_TAG#server/}"
          echo "TAG=$RAW_TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: graalvm/setup-graalvm@54b4f5a65c1a84b2fdfdc2078fe43df32819e4b1 # v1
        with:
          java-version: '25'
          distribution: 'graalvm'

      - uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4.4.3

      - name: Build and test all modules
        run: ./gradlew build

      - name: Build native server binary
        run: ./gradlew hensu-server:build -Dquarkus.native.enabled=true -Dquarkus.package.type=native -x test

      - name: Prepare release artifact
        run: |
          SERVER_BIN=$(find hensu-server/build -maxdepth 1 -name '*-runner' ! -name '*.jar' -type f)
          cp "$SERVER_BIN" hensu-server-linux-x86_64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" =~ -(alpha|beta|rc) ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Server $VERSION" \
            --generate-notes \
            $PRERELEASE_FLAG \
            hensu-server-linux-x86_64
